<!DOCTYPE html>
<html>
<head>
    <title>Lalli AI Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- ========== SIDEBAR ========== -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2> Lalli AI</h2>
            <p>Your AI assistant</p>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active">✨ New Chat</div>
            <div class="menu-item">📋 History</div>
            <div class="menu-item">⚙️ Settings</div>
        </div>
        <div class="sidebar-footer">
            <div class="user-info">
                <span class="user-avatar">👤</span>
                <span>Guest</span>
            </div>
        </div>
    </div>

    <!-- ========== MAIN CHAT AREA ========== -->
    <div class="main-chat">
        <!-- Header (optional, we'll move title to sidebar) -->
        <div class="chat-header">
            <h1>Lalli AI</h1>
            <p>Your friendly AI assistant</p>
        </div>

        <!-- MESSAGES AREA -->
        <div class="chat-messages" id="messages">
            <!-- Welcome message with avatar -->
            <div class="message-wrapper bot">
                <div class="avatar bot-avatar">🤖</div>
                <div class="message bot-message">
                    Hello! I'm Lalli AI. How can I help you today?
                </div>
            </div>
        </div>

        <!-- INPUT AREA -->
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type your message..." />
            <button id="send-btn">Send</button>
        </div>
    </div>

    <!-- ========== JAVASCRIPT ========== -->
    <script>
        // DOM elements
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-btn');

        // Function to add a message with avatar
        function addMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${sender}`;

            const avatar = document.createElement('div');
            avatar.className = `avatar ${sender}-avatar`;
            avatar.textContent = sender === 'user' ? '👤' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = `message ${sender}-message`;
            bubble.textContent = text;

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            messagesContainer.appendChild(wrapper);

            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Send message function (non‑streaming for simplicity – upgrade later)
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            userInput.value = '';
            sendButton.disabled = true;
            sendButton.textContent = 'Sending...';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                addMessage(data.reply, 'bot');
            } catch (error) {
                addMessage('Sorry, something went wrong. Please try again.', 'bot');
                console.error(error);
            } finally {
                sendButton.disabled = false;
                sendButton.textContent = 'Send';
                userInput.focus();
            }
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });

        userInput.focus();
    </script>
</body>
</html>
